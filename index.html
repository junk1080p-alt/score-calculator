<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>學期成績計算機</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   Linear 暗色發光 Bento · 學期成績計算機
   ══════════════════════════════════════ */

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:#07080A;
  color:#E4E6ED;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(99,102,241,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 30% 100%, rgba(139,92,246,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 70%, rgba(59,130,246,0.04) 0%, transparent 50%);
  background-attachment:fixed;
}

/* ── Root Variables ── */
:root{
  --bg-page:#07080A;
  --bg-card:rgba(18,20,26,0.85);
  --bg-card-hover:rgba(24,27,34,0.9);
  --border-subtle:rgba(255,255,255,0.06);
  --border-active:rgba(99,102,241,0.4);
  --border-glow:rgba(99,102,241,0.15);
  --text-primary:#E4E6ED;
  --text-secondary:#8B8FA3;
  --text-tertiary:#5C5F72;
  --accent:#6366F1;
  --accent-light:#818CF8;
  --accent-glow:rgba(99,102,241,0.25);
  --success:#22C55E;
  --success-bg:rgba(34,197,94,0.1);
  --danger:#EF4444;
  --danger-bg:rgba(239,68,68,0.1);
  --warn:#F59E0B;
  --warn-bg:rgba(245,158,11,0.1);
  --purple:#8B5CF6;
  --blue:#3B82F6;
  --font-mono:'JetBrains Mono','SF Mono',monospace;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
  --shadow-card:0 1px 3px rgba(0,0,0,0.3),0 0 0 0.5px rgba(255,255,255,0.04);
  --shadow-glow:0 0 20px rgba(99,102,241,0.08);
}

/* ── App Container ── */
.app{
  width:100%;
  max-width:420px;
  padding:20px 14px 40px;
}

/* ════════════════════════════
   HEADER
   ════════════════════════════ */
.header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:24px;
  padding:14px 16px;
  background:var(--bg-card);
  border-radius:var(--radius-lg);
  border:0.5px solid var(--border-subtle);
  box-shadow:var(--shadow-card),var(--shadow-glow);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.header-icon{
  width:38px;height:38px;
  border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:#fff;
  font-size:16px;
  flex-shrink:0;
  box-shadow:0 0 12px var(--accent-glow);
}
.header-text h1{
  font-size:16px;
  font-weight:600;
  letter-spacing:-0.2px;
  line-height:1.25;
  color:var(--text-primary);
}
.header-text .sub{
  font-size:11px;
  color:var(--text-tertiary);
  font-weight:400;
  letter-spacing:0.2px;
  margin-top:1px;
}

/* ════════════════════════════
   BENTO GRID
   ════════════════════════════ */
.bento{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.bento-card{
  background:var(--bg-card);
  border-radius:var(--radius-lg);
  border:0.5px solid var(--border-subtle);
  box-shadow:var(--shadow-card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:16px;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.bento-card:focus-within{
  border-color:var(--border-active);
  box-shadow:var(--shadow-card),0 0 24px var(--accent-glow);
}
.bento-card-tight{
  padding:14px 16px;
}
.bento-card-title{
  font-size:10px;
  font-weight:600;
  letter-spacing:0.8px;
  text-transform:uppercase;
  color:var(--text-tertiary);
  margin-bottom:12px;
}

/* ════════════════════════════
   WEIGHT BADGES (inline)
   ════════════════════════════ */
.weight-row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.weight-chip{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:500;
  letter-spacing:0.2px;
  border:0.5px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
}
.weight-chip .pct{
  font-weight:700;
  font-size:12px;
  color:var(--accent-light);
}
.weight-chip .label{color:var(--text-secondary)}

/* ════════════════════════════
   SCORE INPUTS — 2×2 Bento Grid
   ════════════════════════════ */
.score-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.score-cell{
  position:relative;
  background:rgba(255,255,255,0.02);
  border-radius:var(--radius-md);
  border:0.5px solid var(--border-subtle);
  padding:12px 14px;
  transition:border-color 0.2s,background 0.2s;
}
.score-cell:focus-within{
  border-color:var(--border-active);
  background:rgba(99,102,241,0.04);
}
.score-cell .label-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}
.score-cell .score-name{
  font-size:12px;
  font-weight:500;
  color:var(--text-secondary);
}
.score-cell .score-wgt{
  font-size:10px;
  font-weight:500;
  color:var(--text-tertiary);
  font-family:var(--font-mono);
}
.score-cell input{
  font-family:var(--font-mono);
  font-size:24px;
  font-weight:600;
  color:var(--text-primary);
  text-align:right;
  border:none;
  outline:none;
  background:transparent;
  width:100%;
  padding:2px 0;
  -moz-appearance:textfield;
}
.score-cell input::-webkit-outer-spin-button,
.score-cell input::-webkit-inner-spin-button{
  -webkit-appearance:none;margin:0;
}
.score-cell input::placeholder{
  color:var(--text-tertiary);
  font-weight:400;
  font-size:16px;
}
.score-cell input:focus{color:var(--accent-light)}

/* accent left border per cell */
.score-cell:nth-child(1){border-left:2px solid rgba(99,102,241,0.3)}
.score-cell:nth-child(2){border-left:2px solid rgba(139,92,246,0.3)}
.score-cell:nth-child(3){border-left:2px solid rgba(59,130,246,0.3)}
.score-cell:nth-child(4){border-left:2px solid rgba(34,197,94,0.3)}

/* ════════════════════════════
   CALCULATE BUTTON
   ════════════════════════════ */
.calc-btn{
  width:100%;
  padding:13px;
  border-radius:var(--radius-md);
  background:linear-gradient(135deg,var(--accent),var(--purple));
  color:#fff;
  border:0.5px solid rgba(255,255,255,0.08);
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:600;
  letter-spacing:0.3px;
  cursor:pointer;
  transition:opacity 0.2s,transform 0.1s;
  box-shadow:0 0 16px var(--accent-glow);
}
.calc-btn:hover{opacity:0.9}
.calc-btn:active{transform:translateY(1px);box-shadow:0 0 8px var(--accent-glow)}

/* ════════════════════════════
   RESULTS PANEL
   ════════════════════════════ */
.results{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:12px;
}
.results.show{display:flex}

/* ── Score Hero ── */
.hero-score{
  text-align:center;
  padding:20px 16px 16px;
}
.hero-score .score-num{
  font-size:56px;
  font-weight:800;
  line-height:1;
  letter-spacing:-1.5px;
  font-family:var(--font-mono);
}
.hero-score .score-num.pass{color:var(--success);text-shadow:0 0 30px rgba(34,197,94,0.2)}
.hero-score .score-num.fail{color:var(--danger);text-shadow:0 0 30px rgba(239,68,68,0.2)}
.hero-score .denom{
  font-size:16px;
  color:var(--text-tertiary);
  font-weight:500;
  display:block;
  margin-top:4px;
}

/* ── Status badge ── */
.status-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.2px;
  margin-top:10px;
}
.status-badge.pass{
  background:var(--success-bg);
  color:var(--success);
  border:0.5px solid rgba(34,197,94,0.2);
}
.status-badge.fail{
  background:var(--danger-bg);
  color:var(--danger);
  border:0.5px solid rgba(239,68,68,0.2);
}
.status-badge.warn{
  background:var(--warn-bg);
  color:var(--warn);
  border:0.5px solid rgba(245,158,11,0.2);
}

/* ── Grade Bar ── */
.grade-bar-wrap{margin:14px 0 0}
.grade-bar{
  height:6px;
  background:rgba(255,255,255,0.06);
  border-radius:3px;
  position:relative;
  overflow:hidden;
}
.grade-bar-fill{
  height:100%;
  border-radius:3px;
  transition:width 0.4s ease;
}
.grade-bar-fill.pass{background:linear-gradient(90deg,var(--success),#4ADE80);box-shadow:0 0 8px rgba(34,197,94,0.3)}
.grade-bar-fill.fail{background:linear-gradient(90deg,var(--danger),#F87171);box-shadow:0 0 8px rgba(239,68,68,0.3)}
.grade-bar-fill.warn{background:linear-gradient(90deg,var(--warn),#FBBF24)}
.grade-line{
  position:absolute;
  top:-2px;bottom:-2px;
  width:2px;
  background:var(--accent);
  box-shadow:0 0 6px var(--accent-glow);
  z-index:2;
  transition:left 0.4s ease;
}
.grade-markers{
  display:flex;
  justify-content:space-between;
  font-size:10px;
  color:var(--text-tertiary);
  font-weight:500;
  margin-top:6px;
  font-family:var(--font-mono);
}
.grade-markers .pass-line{
  color:var(--accent-light);
  font-weight:600;
}

/* ── Target Analysis ── */
.target-card{
  text-align:center;
  padding:10px 0 4px;
}
.target-card .big-number{
  font-family:var(--font-mono);
  font-size:32px;
  font-weight:700;
  display:block;
  margin-bottom:4px;
}
.target-card .big-number.blue{color:var(--accent-light)}
.target-card .big-number.green{color:var(--success)}
.target-card .big-number.red{color:var(--danger)}
.target-card .desc{
  font-size:13px;
  color:var(--text-secondary);
  line-height:1.6;
  font-weight:400;
}

/* ── What-If Table ── */
.whatif-table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  margin-top:6px;
}
.whatif-table thead th{
  text-align:left;
  padding:6px 8px;
  font-size:10px;
  font-weight:600;
  color:var(--text-tertiary);
  letter-spacing:0.5px;
  text-transform:uppercase;
  border-bottom:0.5px solid var(--border-subtle);
}
.whatif-table tbody td{
  padding:7px 8px;
  border-bottom:0.5px solid rgba(255,255,255,0.03);
  font-weight:500;
  font-family:var(--font-mono);
  font-size:12px;
}
.whatif-table tbody tr:last-child td{border-bottom:none}
.whatif-table tbody tr.highlight{
  background:rgba(99,102,241,0.08);
  border-radius:4px;
}
.whatif-table .pass{color:var(--success)}
.whatif-table .fail{color:var(--danger)}
.whatif-table .col-status{text-align:center}

/* ── Breakdown ── */
.breakdown-list{
  display:grid;
  gap:10px;
}
.breakdown-item{
  display:grid;
  grid-template-columns:1fr 36px 50px;
  gap:8px;
  align-items:center;
}
.breakdown-item .b-label{
  font-size:12px;
  color:var(--text-secondary);
}
.breakdown-item .b-label strong{
  color:var(--text-primary);
  font-weight:600;
}
.breakdown-item .b-bar{
  height:6px;
  background:rgba(255,255,255,0.05);
  border-radius:3px;
  overflow:hidden;
}
.breakdown-item .b-fill{
  height:100%;
  border-radius:3px;
  transition:width 0.3s;
}
.breakdown-item .b-fill.c1{background:linear-gradient(90deg,var(--accent),#818CF8)}
.breakdown-item .b-fill.c2{background:linear-gradient(90deg,var(--purple),#A78BFA)}
.breakdown-item .b-fill.c3{background:linear-gradient(90deg,var(--blue),#60A5FA)}
.breakdown-item .b-fill.c4{background:linear-gradient(90deg,var(--success),#4ADE80)}
.breakdown-item .b-pts{
  text-align:right;
  font-family:var(--font-mono);
  font-size:12px;
  font-weight:600;
  color:var(--accent-light);
}

/* ── Clear ── */
.clear-btn{
  display:block;
  margin:0 auto;
  background:rgba(255,255,255,0.03);
  border:0.5px solid var(--border-subtle);
  border-radius:var(--radius-sm);
  font-family:'Inter',sans-serif;
  font-size:11px;
  font-weight:500;
  color:var(--text-tertiary);
  cursor:pointer;
  padding:8px 16px;
  transition:color 0.2s,background 0.2s;
}
.clear-btn:hover{
  color:var(--danger);
  background:rgba(239,68,68,0.06);
}

/* ── Footer ── */
.footer{
  text-align:center;
  margin-top:28px;
  padding-top:14px;
  border-top:0.5px solid var(--border-subtle);
  font-size:10px;
  color:var(--text-tertiary);
  letter-spacing:0.3px;
  font-weight:400;
}

/* ── Utility ── */
.hidden{display:none !important}
</style>
</head>
<body>

<div class="app">

  <!-- ═══ HEADER ═══ -->
  <div class="header">
    <div class="header-icon">G</div>
    <div class="header-text">
      <h1>學期成績計算機</h1>
      <div class="sub">高中 · 三段制加權評量</div>
    </div>
  </div>

  <!-- ═══ BENTO ═══ -->
  <div class="bento">

    <!-- Card 1: Score Inputs (2×2) -->
    <div class="bento-card">
      <div class="bento-card-title">成績輸入</div>
      <div class="score-grid">
        <div class="score-cell">
          <div class="label-row">
            <span class="score-name">一段</span>
            <span class="score-wgt">20%</span>
          </div>
          <input type="number" id="s1" min="0" max="100" placeholder="0" inputmode="numeric">
        </div>
        <div class="score-cell">
          <div class="label-row">
            <span class="score-name">二段</span>
            <span class="score-wgt">20%</span>
          </div>
          <input type="number" id="s2" min="0" max="100" placeholder="0" inputmode="numeric">
        </div>
        <div class="score-cell">
          <div class="label-row">
            <span class="score-name">三段</span>
            <span class="score-wgt">30%</span>
          </div>
          <input type="number" id="s3" min="0" max="100" placeholder="0" inputmode="numeric">
        </div>
        <div class="score-cell">
          <div class="label-row">
            <span class="score-name">作業</span>
            <span class="score-wgt">30%</span>
          </div>
          <input type="number" id="hw" min="0" max="100" placeholder="0" inputmode="numeric">
        </div>
      </div>
    </div>

    <!-- Card 2: Weight Summary (ribbon) -->
    <div class="bento-card bento-card-tight">
      <div class="weight-row">
        <span class="weight-chip"><span class="pct">20%</span><span class="label">一段</span></span>
        <span class="weight-chip"><span class="pct">20%</span><span class="label">二段</span></span>
        <span class="weight-chip"><span class="pct">30%</span><span class="label">三段</span></span>
        <span class="weight-chip"><span class="pct">30%</span><span class="label">作業</span></span>
      </div>
    </div>

    <!-- Calculate Button -->
    <button class="calc-btn" id="calcBtn">計算學期成績</button>

    <!-- ═══ RESULTS (hidden until calculated) ═══ -->
    <div class="results hidden" id="results">

      <!-- Total Score Hero -->
      <div class="bento-card">
        <div class="hero-score">
          <div class="score-num" id="totalScore">0.0</div>
          <span class="denom">/ 100</span>
          <div><span class="status-badge" id="statusBadge">—</span></div>
          <div class="grade-bar-wrap">
            <div class="grade-bar">
              <div class="grade-bar-fill" id="gradeFill" style="width:0%"></div>
              <div class="grade-line" id="gradeLine" style="left:60%"></div>
            </div>
            <div class="grade-markers">
              <span>0</span>
              <span class="pass-line">60 及格線</span>
              <span>100</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Target Analysis -->
      <div class="bento-card">
        <div class="bento-card-title">三段目標分析</div>
        <div class="target-card" id="targetAnalysis">
          <span class="big-number blue">—</span>
        </div>
      </div>

      <!-- What-If Table -->
      <div class="bento-card hidden" id="whatifSection">
        <div class="bento-card-title">三段模擬</div>
        <table class="whatif-table">
          <thead><tr><th>三段得分</th><th>加權總分</th><th class="col-status">結果</th></tr></thead>
          <tbody id="whatifBody"></tbody>
        </table>
      </div>

      <!-- Breakdown -->
      <div class="bento-card">
        <div class="bento-card-title">各項貢獻細項</div>
        <div class="breakdown-list" id="breakdownList"></div>
      </div>

      <!-- Clear -->
      <button class="clear-btn" id="clearBtn">清除所有分數</button>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">加權公式：一段 20% + 二段 20% + 三段 30% + 作業 30%</div>

</div>

<script>
(function(){
const $=id=>document.getElementById(id);
const s1=$('s1'),s2=$('s2'),s3=$('s3'),hw=$('hw');
const results=$('results'),calcBtn=$('calcBtn');
const totalScore=$('totalScore'),statusBadge=$('statusBadge'),gradeFill=$('gradeFill'),gradeLine=$('gradeLine');
const targetAnalysis=$('targetAnalysis'),breakdownList=$('breakdownList');
const whatifSection=$('whatifSection'),whatifBody=$('whatifBody'),clearBtn=$('clearBtn');

const W={s1:0.2,s2:0.2,s3:0.3,hw:0.3};
const PASS=60;

function v(el){const n=parseFloat(el.value);return isNaN(n)?0:Math.min(100,Math.max(0,n))}
function has(el){return el.value!==''}

function compute(){
  const a=v(s1),b=v(s2),c=v(s3),d=v(hw);
  const total=a*W.s1+b*W.s2+c*W.s3+d*W.hw;
  const passed=total>=PASS;
  const baseNoS3=a*W.s1+b*W.s2+d*W.hw;
  const cNeeded=(PASS-baseNoS3)/W.s3;
  const hS1=has(s1),hS2=has(s2),hS3=has(s3),hHw=has(hw);
  const anyInput=hS1||hS2||hS3||hHw;

  // ── Total Score ──
  totalScore.textContent=total.toFixed(1);
  totalScore.className='score-num '+(passed?'pass':'fail');

  // ── Status ──
  if(!anyInput){
    statusBadge.textContent='請輸入至少一項成績';
    statusBadge.className='status-badge warn';
  }else{
    statusBadge.textContent=passed?'及格 ✓':'不及格 · 有被當風險';
    statusBadge.className='status-badge '+(passed?'pass':'fail');
  }

  // ── Grade Bar ──
  const pct=Math.min(total,100);
  gradeFill.style.width=pct+'%';
  gradeFill.className='grade-bar-fill '+(passed?'pass':'fail');
  // 60% line
  gradeLine.style.left='60%';

  // ── Breakdown ──
  const items=[
    {label:'一段',score:a,wgt:W.s1,cls:'c1'},
    {label:'二段',score:b,wgt:W.s2,cls:'c2'},
    {label:'三段',score:c,wgt:W.s3,cls:'c3'},
    {label:'作業',score:d,wgt:W.hw,cls:'c4'},
  ];
  breakdownList.innerHTML=items.map(it=>{
    const contrib=it.score*it.wgt;
    return '<div class="breakdown-item">'
      +'<span class="b-label"><strong>'+it.label+'</strong> '+it.score+'分</span>'
      +'<div class="b-bar"><div class="b-fill '+it.cls+'" style="width:'+it.score+'%"></div></div>'
      +'<span class="b-pts">'+contrib.toFixed(1)+'</span>'
      +'</div>';
  }).join('');

  // ── Target Analysis ──
  let thtml='';
  if(!hS3){
    if(cNeeded<=0){
      thtml='<span class="big-number green">✓ 已穩過</span>'
        +'<div class="desc">即使三段 0 分，加權總分仍有 '+baseNoS3.toFixed(1)+' 分，確定及格。</div>';
    }else if(cNeeded<=100){
      thtml='<span class="big-number blue">三段需考 '+Math.ceil(cNeeded)+' 分</span>'
        +'<div class="desc">以目前一段、二段、作業成績推算，三段至少要 <strong>'+Math.ceil(cNeeded)+'</strong> 分才能及格（加權總分 ≥ 60）。</div>';
    }else{
      const maxP=baseNoS3+100*W.s3;
      thtml='<span class="big-number red">⚠ 極度危險</span>'
        +'<div class="desc">目前僅 '+baseNoS3.toFixed(1)+' 分，即使三段滿分最高也只有 '+maxP.toFixed(1)+' 分。請與老師確認補救措施。</div>';
    }
  }else{
    if(passed){
      thtml='<span class="big-number green">✓ 目前及格</span>'
        +'<div class="desc">加權總分 '+total.toFixed(1)+' 分，已達 60 分及格標準。</div>';
    }else{
      const maxP=baseNoS3+100*W.s3;
      if(maxP<PASS){
        thtml='<span class="big-number red">⚠ '+total.toFixed(1)+' 分 — 確定被當</span>'
          +'<div class="desc">即使三段滿分最高也僅 '+maxP.toFixed(1)+' 分。請向老師確認補救方案。</div>';
      }else{
        const diff=Math.max(0,Math.ceil(cNeeded-c));
        thtml='<span class="big-number blue">三段需達 '+Math.ceil(cNeeded)+' 分</span>'
          +'<div class="desc">目前三段 '+c+' 分，離目標差 <strong>'+diff+' 分</strong>。<br>三段需拿到 <strong>'+Math.ceil(cNeeded)+'</strong> 分才能及格。</div>';
      }
    }
  }
  targetAnalysis.innerHTML=thtml;

  // ── What-If Table ──
  const baseDefined=hS1||hS2||hHw;
  const showWhatif=baseDefined&&!passed;
  if(showWhatif){
    whatifSection.classList.remove('hidden');
    let testScores,sectionLabel;
    if(!hS3){
      testScores=[0,20,40,60,80,100];
      sectionLabel='三段各分數模擬';
    }else{
      testScores=[];
      for(let x=c;x<=100;x+=10) testScores.push(Math.min(100,x));
      testScores=[...new Set(testScores)].sort((a,b)=>a-b);
      if(testScores[testScores.length-1]!==100&&testScores[testScores.length-1]<100) testScores.push(100);
      sectionLabel='三段提高模擬';
    }
    whatifSection.querySelector('.bento-card-title').textContent=sectionLabel;
    whatifBody.innerHTML=testScores.map(sc=>{
      const testTotal=baseNoS3+sc*W.s3;
      const pass=testTotal>=PASS;
      const hl=sc===c?' class="highlight"':'';
      return '<tr'+hl+'>'
        +'<td>'+(sc===c?'▸ '+sc:sc)+'</td>'
        +'<td class="'+(pass?'pass':'fail')+'">'+testTotal.toFixed(1)+'</td>'
        +'<td class="col-status '+(pass?'pass':'fail')+'">'+(pass?'及格':'不及格')+'</td>'
        +'</tr>';
    }).join('');
  }else{
    whatifSection.classList.add('hidden');
  }

  results.classList.remove('hidden');
}

// ── Events ──
calcBtn.addEventListener('click',compute);

document.querySelectorAll('.score-cell input').forEach(inp=>{
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')compute()});
  inp.addEventListener('blur',()=>{
    const val=parseFloat(inp.value);
    if(!isNaN(val)) inp.value=Math.min(100,Math.max(0,Math.round(val)));
  });
});

clearBtn.addEventListener('click',()=>{
  [s1,s2,s3,hw].forEach(el=>{el.value=''});
  results.classList.add('hidden');
  s1.focus();
});

})();
</script>

</body>
</html>
